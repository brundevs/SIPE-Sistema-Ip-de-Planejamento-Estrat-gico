<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" width="100%" height="auto">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;display=swap');
            .brand { 
                font-family: 'Montserrat', 'Inter', sans-serif; 
                font-weight: 900; 
                font-size: 78px; 
                fill: #001841; 
                letter-spacing: -2px; 
            }
            .sub { 
                font-family: 'Montserrat', 'Inter', sans-serif; 
                font-weight: 700; 
                font-size: 13.5px; 
                fill: #001841; 
            }
        </style>
    </defs>
    
    <!-- SIPE Tree Logo -->
    <g stroke="#00c580" stroke-width="9" fill="none" stroke-linejoin="round" stroke-linecap="round">
        <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" />
        <line x1="50" y1="50" x2="50" y2="115" />
        <path d="M 10,120 Q 50,105 90,120" />
    </g>
    
    <!-- SIPE Text -->
    <text x="105" y="85" class="brand">SIPE</text>
    
    <!-- Subtitle -->
    <text x="110" y="112" class="sub">Sistema Ipe de</text>
    <text x="110" y="130" class="sub">Planejamento Estrategico</text>
</svg>
